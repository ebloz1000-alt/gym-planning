services:
  - type: web
    name: fitflow-gym-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn fitflow_api.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DARAJA_CONSUMER_KEY
        sync: false
      - key: DARAJA_CONSUMER_SECRET
        sync: false
      - key: DARAJA_PASSKEY
        sync: false
      - key: DARAJA_SHORTCODE
        sync: false
      - key: DARAJA_CALLBACK_URL
        value: "https://<YOUR_RENDER_SERVICE>.onrender.com/api/mpesa/callback/"
        sync: false
      - key: DARAJA_ENV
        sync: false
