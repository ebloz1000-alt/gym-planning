name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Build APK and deploy web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Build release APK
        run: flutter build apk --release

      - name: Copy APK to web downloads
        run: |
          mkdir -p build/web/downloads
          cp build/app/outputs/flutter-apk/app-release.apk build/web/downloads/fitflow-release.apk || true

      - name: Rewrite built index.html to use Pages APK URL
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}"
          echo "Pages URL: $PAGES_URL"
          INDEX=build/web/index.html
          if [ -f "$INDEX" ]; then
            # Replace apk-url meta value
            sed -i "s|<meta name=\"apk-url\" content=\".*\">|<meta name=\"apk-url\" content=\"${PAGES_URL}/downloads/fitflow-release.apk\">|g" "$INDEX"
          else
            echo "Built index.html not found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitflow-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy `build/web` to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: build/web
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
